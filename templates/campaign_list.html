<!DOCTYPE html>
<html>
<head>
    <title>Campaigns List</title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: 40px auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        th {
            background-color: #f4f4f4;
        }
        a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>Campaigns List</h2>
    <a href="{% url 'campaign_dashboard' %}" class="btn">Dashboard</a><br/><br/>
    <a href="{% url 'create_campaign' %}" class="btn">+ Create Campaign</a><br/><br/>
    <a href="{% url 'campaign_list' %}" class="btn">+ Campaign List</a>
</div>

<br><br>

<table>
    <tr>
        <th>Name</th>
        <th>Status</th>
        <th>Scheduled Time</th>
    </tr>

    {% for campaign in campaigns %}
    <tr>
        <td>{{ campaign.campaign_name }}</td>
        <td>{{ campaign.get_status_display }}</td>
        <td>{{ campaign.scheduled_time }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
