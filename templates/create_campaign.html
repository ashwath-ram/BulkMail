<!DOCTYPE html>
<html>
<head>
    <title>Create Campaign</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        input, textarea, select {
            margin-bottom: 15px;
            padding: 8px;
        }
        button {
            padding: 10px;
            background-color: #2c7be5;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #1a68d1;
        }
    </style>
</head>
<body>

<h2>Create Campaign</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Campaign</button>
</form>

</body>
</html>
